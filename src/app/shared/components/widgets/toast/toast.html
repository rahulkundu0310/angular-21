<div
	role="alert"
	class="toast"
	[attr.data-id]="id()"
	[attr.data-type]="type()"
	[class]="`toast-${type()}`"
>
	<!-- Renders the metadata section that holds the toast icon and message content -->
	<div class="toast-metadata">
		<!-- Renders the icon wrapper and switches the displayed icon by the toast type -->
		<div class="toast-icon" [attr.data-icon]="'true'" aria-hidden="true">
			@switch (type()) {
				@case ('info') {
					<lucide-icon name="info" [size]="20" [strokeWidth]="2"></lucide-icon>
				}
				@case ('error') {
					<lucide-icon name="circle-x" [size]="20" [strokeWidth]="2"></lucide-icon>
				}
				@case ('success') {
					<lucide-icon name="circle-check" [size]="20" [strokeWidth]="2"></lucide-icon>
				}
				@case ('warning') {
					<lucide-icon name="triangle-alert" [size]="20" [strokeWidth]="2"></lucide-icon>
				}
				@case ('loading') {
					<p-progressSpinner
						[strokeWidth]="'4'"
						[class]="'toast-spinner'"
						[animationDuration]="'2.5s'"
						[attr.aria-label]="'Loading'"
					/>
				}
			}
		</div>

		<!-- Renders the content area that holds the toast message and description text -->
		<div class="toast-content">
			<div class="toast-message" [attr.data-message]="'true'">
				{{ message() }}
			</div>
			@if (!!description()) {
				<div class="toast-description" [attr.data-description]="'true'">
					{{ description() }}
				</div>
			}
		</div>
	</div>

	<!-- Renders the toast actions wrapper that holds all available control buttons -->
	<div class="toast-actions">
		<!-- Renders the action button bound to a click handler when action is provided -->
		@if (action(); as action) {
			<button
				type="button"
				[attr.data-button]="true"
				(click)="action.clicked($event)"
				[tooltipDisabled]="!action.tooltip"
				[pTooltip]="action.tooltip?.tooltip"
				class="toast-button toast-button-action"
				[attr.aria-label]="action.ariaLabel ?? action.label"
				[tooltipEvent]="action.tooltip?.tooltipEvent ?? 'hover'"
				[tooltipPosition]="action.tooltip?.tooltipPosition ?? 'top'"
			>
				<!-- Renders the defined icon element or otherwise outputs the plain text label -->
				@if (action.icon) {
					<lucide-icon
						class="toast-action-icon"
						[name]="action.icon.name"
						[size]="action.icon.size"
						[strokeWidth]="action.icon.strokeWidth ?? 2"
						[attr.aria-hidden]="action.icon.ariaHidden ?? true"
						[absoluteStrokeWidth]="action.icon.absoluteStrokeWidth ?? false"
					>
					</lucide-icon>
				} @else {
					<span class="toast-button-label">{{ action.label }}</span>
				}
			</button>
		}

		<!-- Renders the cancel button bound to a click handler when cancel is provided -->
		@if (cancel(); as cancel) {
			<button
				type="button"
				[attr.data-cancel]="true"
				(click)="cancel.clicked($event)"
				[tooltipDisabled]="!cancel.tooltip"
				[pTooltip]="cancel.tooltip?.tooltip"
				class="toast-button toast-button-cancel"
				[attr.aria-label]="cancel.ariaLabel ?? cancel.label"
				[tooltipEvent]="cancel.tooltip?.tooltipEvent ?? 'hover'"
				[tooltipPosition]="cancel.tooltip?.tooltipPosition ?? 'top'"
			>
				<!-- Renders the defined icon element or otherwise outputs the plain text label -->
				@if (cancel.icon) {
					<lucide-icon
						class="toast-action-icon"
						[name]="cancel.icon.name"
						[size]="cancel.icon.size"
						[strokeWidth]="cancel.icon.strokeWidth ?? 2"
						[attr.aria-hidden]="cancel.icon.ariaHidden ?? true"
						[absoluteStrokeWidth]="cancel.icon.absoluteStrokeWidth ?? false"
					>
					</lucide-icon>
				} @else {
					<span class="toast-button-label">{{ cancel.label }}</span>
				}
			</button>
		}

		<!-- Renders the close button when this toast supports being manually dismissed -->
		@if (dismissible()) {
			<button
				type="button"
				aria-label="Close toast"
				[attr.data-close-button]="true"
				(click)="state().dismiss(id())"
				class="toast-button toast-button-close"
			>
				<span class="material-icons">close</span>
			</button>
		}
	</div>
</div>
