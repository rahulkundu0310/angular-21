@let operation = operationState();
@let signInForm = signInFormState.form;
@let formInvalid = signInForm().invalid();
@let submitted = signInFormState.submitted;

<form [formRoot]="signInForm">
	<field-group
		[submitted]="submitted()"
		[field]="signInForm.email"
		[config]="{
			inputId: 'email',
			label: 'Email Address'
		}"
	>
		<input
			trimInput
			id="email"
			type="email"
			preventAutofill
			class="field-control"
			[formField]="signInForm.email"
			placeholder="Enter Email Address"
			aria-describedby="email-hint email-error"
		/>
	</field-group>
	<field-group
		[submitted]="submitted()"
		[field]="signInForm.password"
		[config]="{
			affix: false,
			label: 'Password',
			inputId: 'password'
		}"
	>
		<password-field
			[formField]="signInForm.password"
			[config]="{
				toggleMask: true,
				inputId: 'password'
			}"
		/>
	</field-group>
	<a class="form-link" aria-label="Reset your password" [routerLink]="['/forgot-password']">
		Forgot Password?
	</a>
	<action
		[config]="{
			type: 'submit',
			label: 'Sign In',
			ariaRole: 'button',
			loading: operation.loading,
			ariaLabel: 'Sign in to your account',
			disabled: formInvalid || operation.loading
		}"
	/>
</form>
