<div
	class="preloader"
	[animate.enter]="animation() ? 'fade-in' : null"
	[animate.leave]="animation() ? 'fade-out' : null"
>
	<div class="preloader-content">
		<!-- Lazily renders the brand logo wrapper when the branding option is provided -->
		@if (branding()) {
			@defer {
				<div class="preloader-brand">
					<brand-logo
						[width]="64"
						[height]="74"
						[mode]="'color'"
						[variant]="'compact'"
						[interactive]="false"
					/>
				</div>
			}
		}

		<!-- Renders the feedback region containing the label and the loading indicator -->
		<div class="preloader-feedback">
			<p class="preloader-label">{{ label() }}</p>
			<div class="preloader-indicator"></div>
		</div>
	</div>
</div>
