<section
	role="region"
	aria-live="polite"
	class="error-state"
	aria-labelledby="error-heading"
	[class]="[styleClass() ?? '', `error-state-${status()}`]"
>
	<div class="container">
		<div class="error-content">
			<h3 class="error-status">{{ status() }}</h3>
			<h2 class="error-title" id="error-heading">
				{{ title() }}
			</h2>
			<p id="error-message" class="error-message">
				{{ message() }}
			</p>
			<action [config]="actionConfig()" />
		</div>
	</div>
</section>
