<error-state
	title="oooops!!"
	status="Access Denied"
	styleClass="access-denied"
	message="Access to this resource is forbidden, contact administrator."
	[actionConfig]="{
		label: 'Back To Home',
		ariaLabel: 'Navigate to home',
		router: { routerLink: [authenticated() ? '/dashboard' : '/sign-in'] }
	}"
></error-state>
